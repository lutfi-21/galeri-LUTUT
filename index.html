<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Eternal Memories | LUTUT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader">
        <h1 class="loader-logo">LUTUT</h1>
        <p class="loader-sub">A LUTFI & DITA PRODUCTION</p>
    </div>

    <div id="loginOverlay">
        <h2>EXCLUSIVE ACCESS</h2>
        <input type="password" id="passInput" placeholder="Masukkan Sandi...">
        <button onclick="checkPass()" class="btn-login">Buka Galeri</button>
        <p id="errorMsg">Sandi Salah, Lutfi!</p>
    </div>

    <div class="forest-background">
        <div class="tree tree-left">
            <svg viewBox="0 0 100 200"><path d="M50,200 L50,140" stroke="#050510" stroke-width="4" fill="none" /><ellipse cx="50" cy="100" rx="35" ry="60" fill="#0a0a1a" /></svg>
        </div>
        <div class="tree tree-right">
            <svg viewBox="0 0 100 200"><path d="M50,200 L50,150" stroke="#050510" stroke-width="3" fill="none" /><ellipse cx="50" cy="110" rx="30" ry="50" fill="#0a0a1a" /></svg>
        </div>
    </div>

    <div id="videoOverlay" class="video-overlay">
        <div class="video-box">
            <video id="surpriseVideo" playsinline>
                <source src="pesan-video.mp4" type="video/mp4">
            </video>
            <button class="btn-close-video" onclick="closeVideo()">Lanjut Ke Galeri &rarr;</button>
        </div>
    </div>

    <div id="player" style="display:none;"></div>

    <div id="mainContent" style="display:none; opacity: 0;">
        <header>
            <h1 class="title">This is LUTUT</h1>
            <p id="loveCounter">Memuat hari bahagia...</p>
            <div class="button-group">
                <button id="musicBtn" onclick="togglePlay()" class="btn-estetik">🎵 Play Music</button>
                <button id="captureBtn" onclick="takeScreenshot()" class="btn-estetik">📸 Capture</button>
            </div>
        </header>

        <main>
            <div class="capsule-section">
                <div class="envelope" onclick="openTimeCapsule()">
                    <span id="lockStatus">🔒</span>
                    <p>Surat Masa Depan</p>
                </div>
            </div>

            <div class="upload-area">
                <input type="text" id="photoCaption" placeholder="Tulis caption...">
                <label for="file-upload" class="btn-upload">+ Tambah Foto</label>
                <input id="file-upload" type="file" accept="image/*" onchange="handleUpload(event)"/>
            </div>

            <div class="gallery-container" id="gallery"></div>
        </main>
    </div>

    <div id="capsuleModal" class="modal-overlay" onclick="closeCapsule()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeCapsule()">&times;</span>
            <h2>Pesan Masa Depan</h2>
            <hr>
            <div id="modalBody"><p id="countdownText"></p></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
