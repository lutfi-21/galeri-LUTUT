<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Eternal Memories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; font-family: sans-serif;">
    <h2 style="margin-bottom:20px; letter-spacing: 2px;">EXCLUSIVE ACCESS</h2>
    <input type="password" id="passInput" placeholder="Masukkan Sandi..." style="padding:12px; border-radius:8px; border:none; text-align:center; outline:none; width:200px;">
    <button onclick="checkPass()" style="margin-top:15px; padding:10px 25px; border-radius:20px; border:1px solid #fff; background:transparent; color:#fff; cursor:pointer;">Buka Galeri</button>
    <p id="errorMsg" style="color:red; margin-top:10px; font-size:12px; display:none;">Sandi Salah, Lutfi!</p>
</div>
    
<div id="player" style="display:none;"></div>
    <div class="background-overlay"></div>

    <header>
        <h1 class="title">This is LUTUT</h1>
        <p class="subtitle">Lutfi Dan Ditut Anjayyy.</p>        
        <div class="audio-container">
    <audio id="bgMusic" loop preload="auto">
        <source src="Terbuang Dalam Waktu - Barasuara (Peaceful Piano).mp3" type="audio/mpeg">
        Browser Anda tidak mendukung elemen audio.
    </audio>
    <button id="musicBtn" onclick="toggleMusic()">🎵 Play Music</button>
</div>
    </header>

    <main>
        <div class="upload-section">
            <label for="file-upload" class="custom-file-upload">
                + Tambah Kenangan Baru
            </label>
            <input id="file-upload" type="file" accept="image/*" multiple onchange="handleUpload(event)"/>
        </div>

        <div class="gallery-container" id="gallery">
            <div class="photo-card placeholder">
                <p>belum tek foto, upload lah foto nyo.</p>
            </div>
        </div>
    </main>

    <div id="videoOverlay" class="video-overlay">
    <video id="surpriseVideo">
        <source src="pesan-video.mp4" type="video/mp4">
        Browser tidak mendukung video.
    </video>
</div>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
